<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отзывы | StretchWell</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body>
    <!-- Хедер -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-text">StretchWell</span>
                </div>
                
                <button class="burger-menu" id="burgerMenu" aria-label="Открыть меню">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                
                <nav class="nav" id="mainNav">
                    <ul class="nav-list">
                        <li><a href="index.html" class="nav-link">Главная</a></li>
                        <li><a href="programs.html" class="nav-link">Программы</a></li>
                        <li><a href="specialists.html" class="nav-link">Специалисты</a></li>
                        <li><a href="reviews.html" class="nav-link active">Отзывы</a></li>
                        <li><a href="contact.html" class="nav-link">Контакты</a></li>
                    </ul>
                    <div class="header-actions-mobile">
                        <a href="login.html" class="btn btn-primary btn-block">Войти</a>
                    </div>
                </nav>
                
                <div class="header-actions desktop-only">
                    <a href="login.html" class="btn btn-primary">Войти</a>
                </div>
            </div>
        </div>
    </header>

    <!-- Hero секция -->
    <section class="reviews-hero">
        <div class="container">
            <h1 class="page-title">Отзывы наших пользователей</h1>
            <p class="page-subtitle">Узнайте, что говорят о нас наши клиенты</p>
        </div>
    </section>

    <!-- Основной контент -->
    <main class="reviews-main">
        <div class="container">
            <div class="reviews-grid" id="reviewsGrid">
                <div class="loading" style="text-align: center; padding: 60px 20px;">
                    <i class="fas fa-spinner fa-spin" style="font-size: 32px; color: #6198FF;"></i>
                    <p style="margin-top: 15px; color: #7f8c8d;">Загрузка отзывов...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Футер -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">
                    <span class="logo-text">StretchWell</span>
                </div>
                <div class="footer-links">
                    <a href="index.html">Главная</a>
                    <a href="programs.html">Программы</a>
                    <a href="specialists.html">Специалисты</a>
                    <a href="reviews.html">Отзывы</a>

                </div>
                <div class="footer-copyright">
                    <p>&copy; 2026 StretchWell. Все права защищены.</p>
                </div>
            </div>
        </div>

    <script type="module" src="js/firebase-config.js"></script>
    
    <!-- Основной JS -->
    <script src="js/main.js"></script>
    <script type="module" src="js/load-reviews.js"></script>
