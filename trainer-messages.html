<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сообщения - StretchWell</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/trainer.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="dashboard-page">
    <!-- Боковая панель -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="index.html" class="logo-link">
                <span class="logo-text">StretchWell</span>
            </a>
            <button class="sidebar-close" id="sidebarClose">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <nav class="sidebar-nav">
            <a href="trainer-dashboard.html" class="nav-item">
                <i class="fas fa-home"></i>
                <span>Главная</span>
            </a>
            <a href="trainer-programs.html" class="nav-item">
                <i class="fas fa-dumbbell"></i>
                <span>Мои программы</span>
            </a>
            <a href="trainer-clients.html" class="nav-item">
                <i class="fas fa-users"></i>
                <span>Мои клиенты</span>
            </a>
            <a href="trainer-messages.html" class="nav-item active">
                <i class="fas fa-envelope"></i>
                <span>Сообщения</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <a href="#" class="nav-item logout" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i>
                <span>Выйти</span>
            </a>
        </div>
    </aside>

    <!-- Основной контент -->
    <main class="main-content">
        <header class="top-bar">
            <button class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </button>
            <div class="top-bar-center">
                <h2 class="page-title">Сообщения</h2>
            </div>
            <div class="user-info">
                <span class="user-name" id="topUserName">Тренер</span>
                <div class="user-avatar-wrapper">
                    <img src="https://ui-avatars.com/api/?name=Trainer&background=6198FF&color=fff" 
                         alt="Avatar" 
                         class="user-avatar"
                         id="userAvatar">
                </div>
            </div>
        </header>

        <!-- 🔥 ЗАМЕНИТЕ ЭТОТ БЛОК НА НОВЫЙ -->
        <div class="page-content">
            <!-- Фильтры -->
            <div class="messages-filters">
                <button class="btn filter-btn active" data-filter="inbox" onclick="window.setFilter('inbox')">
                    <i class="fas fa-inbox"></i> Входящие
                    <span class="badge badge-info" id="unreadCount" style="display:none">0</span>
                </button>
                <button class="btn filter-btn" data-filter="sent" onclick="window.setFilter('sent')">
                    <i class="fas fa-paper-plane"></i> Отправленные
                </button>
                <button class="btn filter-btn" data-filter="all" onclick="window.setFilter('all')">
                    <i class="fas fa-list"></i> Все
                </button>
                <button class="btn btn-outline btn-sm" onclick="loadMessages()" style="margin-left: auto;">
                    <i class="fas fa-sync-alt"></i> Обновить
                </button>
            </div>
            
            <!-- Список сообщений -->
            <div class="messages-container">
                <div class="messages-header">
                    <h3><i class="fas fa-envelope"></i> Сообщения</h3>
                </div>
                
                <div id="messagesList" class="messages-list">
                    <div class="loading">
                        <i class="fas fa-spinner fa-spin"></i> Загрузка...
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Модальное окно: чтение сообщения -->
    <div class="modal" id="messageModal">
        <div class="modal-overlay" onclick="window.closeMessageModal()"></div>
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h3><i class="fas fa-envelope-open"></i> Сообщение</h3>
                <button class="modal-close" onclick="window.closeMessageModal()">&times;</button>
            </div>
            <div class="modal-body" id="messageBody" style="padding: 25px;">
                <!-- Загрузится динамически -->
            </div>
        </div>
    </div>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/trainer-messages.js"></script>
</body>
</html>
