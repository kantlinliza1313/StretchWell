<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои клиенты - StretchWell</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/trainer.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="dashboard-page">
    <!-- Боковая панель -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="index.html" class="logo-link">
                <span class="logo-text">StretchWell</span>
            </a>
            <button class="sidebar-close" id="sidebarClose">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <nav class="sidebar-nav">
    <a href="trainer-dashboard.html" class="nav-item">
        <i class="fas fa-home"></i>
        <span>Главная</span>
    </a>
    <a href="trainer-programs.html" class="nav-item">
        <i class="fas fa-dumbbell"></i>
        <span>Мои программы</span>
    </a>
    <a href="trainer-clients.html" class="nav-item">
        <i class="fas fa-users"></i>
        <span>Мои клиенты</span>
    </a>
    <!-- 🔥 ДОБАВЬТЕ ЭТОТ ПУНКТ -->
    <a href="trainer-messages.html" class="nav-item">
        <i class="fas fa-envelope"></i>
        <span>Сообщения</span>
        <span class="badge badge-info" id="msgCount" style="display:none">0</span>
    </a>
    <!-- =================== -->
</nav>

        <div class="sidebar-footer">
            <a href="#" class="nav-item logout" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i>
                <span>Выйти</span>
            </a>
        </div>
    </aside>

    <!-- Основной контент -->
    <main class="main-content">
        <header class="top-bar">
            <button class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </button>
            <div class="top-bar-center">
                <h2 class="page-title">Мои клиенты</h2>
            </div>
            <div class="user-info">
                <span class="user-name" id="topUserName">Тренер</span>
                <div class="user-avatar-wrapper">
                    <img src="https://ui-avatars.com/api/?name=Trainer&background=6198FF&color=fff" 
                         alt="Avatar" 
                         class="user-avatar"
                         id="userAvatar">
                </div>
            </div>
        </header>

        <div class="page-content">
            <!-- Заголовок + поиск -->
            <div class="section-header">
                <h3 class="section-title">
                    <i class="fas fa-users"></i>
                    Мои клиенты
                    <span class="badge badge-info" id="clientsCount">0</span>
                </h3>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchClients" class="form-input" placeholder="Поиск по имени или email..." style="width: 300px;">
                </div>
            </div>

            <!-- Фильтр по программе -->
            <div class="filter-box" style="margin-bottom: 20px;">
                <label style="margin-right: 10px; font-weight: 600;">
                    <i class="fas fa-filter"></i> Фильтр по программе:
                </label>
                <select id="filterByProgram" class="form-input" style="width: 300px; display: inline-block;">
                    <option value="all">Все программы</option>
                </select>
            </div>

            <!-- Карточки клиентов -->
            <div id="clientsGrid" class="clients-grid">
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i>
                    Загрузка клиентов...
                </div>
            </div>
        </div>
    </main>

    <!-- ============================================ -->
    <!-- 🔹 МОДАЛЬНОЕ ОКНО: ДЕТАЛИ КЛИЕНТА -->
    <!-- ============================================ -->
    <div class="modal" id="clientDetailsModal">
        <div class="modal-overlay" onclick="window.closeClientDetails()"></div>
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h3><i class="fas fa-user"></i> Детали клиента</h3>
                <button class="modal-close" onclick="window.closeClientDetails()">&times;</button>
            </div>
            <div class="modal-body" id="clientDetailsBody" style="padding: 25px;">
                <!-- Загрузится динамически -->
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/trainer-clients.js"></script>
</body>
</html>
