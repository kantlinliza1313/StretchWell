<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои программы - StretchWell</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/trainer.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="dashboard-page">
    <!-- Боковая панель -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="index.html" class="logo-link">
                <span class="logo-text">StretchWell</span>
            </a>
            <button class="sidebar-close" id="sidebarClose">
                <i class="fas fa-times"></i>
            </button>
        </div>

       <nav class="sidebar-nav">
    <a href="trainer-dashboard.html" class="nav-item">
        <i class="fas fa-home"></i>
        <span>Главная</span>
    </a>
    <a href="trainer-programs.html" class="nav-item">
        <i class="fas fa-dumbbell"></i>
        <span>Мои программы</span>
    </a>
    <a href="trainer-clients.html" class="nav-item">
        <i class="fas fa-users"></i>
        <span>Мои клиенты</span>
    </a>
    <!-- 🔥 ДОБАВЬТЕ ЭТОТ ПУНКТ -->
    <a href="trainer-messages.html" class="nav-item">
        <i class="fas fa-envelope"></i>
        <span>Сообщения</span>
        <span class="badge badge-info" id="msgCount" style="display:none">0</span>
    </a>
    <!-- =================== -->
</nav>

        <div class="sidebar-footer">
            <a href="#" class="nav-item logout" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i>
                <span>Выйти</span>
            </a>
        </div>
    </aside>

    <!-- Основной контент -->
    <main class="main-content">
        <header class="top-bar">
            <button class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </button>
            <div class="top-bar-center">
                <h2 class="page-title">Мои программы</h2>
            </div>
            <div class="user-info">
                <span class="user-name" id="topUserName">Тренер</span>
                <div class="user-avatar-wrapper">
                    <img src="https://ui-avatars.com/api/?name=Trainer&background=6198FF&color=fff" 
                         alt="Avatar" 
                         class="user-avatar"
                         id="userAvatar">
                </div>
            </div>
        </header>

        <div class="page-content">
            <!-- Заголовок + кнопка -->
            <div class="section-header">
                <h3 class="section-title">
                    <i class="fas fa-dumbbell"></i>
                    Мои программы тренировок
                </h3>
                <button class="btn btn-primary" onclick="window.openProgramModal()">
                    <i class="fas fa-plus"></i> Создать программу
                </button>
            </div>

            <!-- Таблица программ -->
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Название</th>
                            <th>Уровень</th>
                            <th>Цель</th>
                            <th>Уроков</th>
                            <th>Клиентов</th>
                            <th>Статус</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="programsTable">
                        <tr><td colspan="7">Загрузка...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- ============================================ -->
    <!-- 🔹 МОДАЛЬНОЕ ОКНО: ПРОГРАММА -->
    <!-- ============================================ -->
    <div class="modal" id="programModal">
        <div class="modal-overlay" onclick="window.closeProgramModal()"></div>
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h3 id="programModalTitle">Добавить программу</h3>
                <button class="modal-close" onclick="window.closeProgramModal()">&times;</button>
            </div>
            <form id="programForm" class="modal-form">
                <input type="hidden" id="programId">
                <div class="form-row">
                    <div class="form-group">
                        <label>Название *</label>
                        <input type="text" id="pTitle" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label>Slug (URL) *</label>
                        <input type="text" id="pSlug" class="form-input" required placeholder="back-pain">
                    </div>
                </div>
                <div class="form-group">
                    <label>Краткое описание *</label>
                    <textarea id="pShortDesc" class="form-input" rows="2" required></textarea>
                </div>
                <div class="form-group">
                    <label>Полное описание</label>
                    <textarea id="pFullDesc" class="form-input" rows="3"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Уровень</label>
                        <select id="pLevel" class="form-input">
                            <option value="beginner">Новичок</option>
                            <option value="intermediate">Средний</option>
                            <option value="advanced">Продвинутый</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Цель</label>
                        <select id="pGoal" class="form-input">
                            <option value="flexibility">Гибкость</option>
                            <option value="strength">Сила</option>
                            <option value="relax">Расслабление</option>
                            <option value="recovery">Восстановление</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Длительность (фильтр)</label>
                        <select id="pDurations" class="form-input">
                            <option value="short">До 15 мин</option>
                            <option value="medium">15-30 мин</option>
                            <option value="long">30+ мин</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Длительность программы</label>
                        <input type="text" id="pDuration" class="form-input" placeholder="4 недели">
                    </div>
                    <div class="form-group">
                        <label>Время в день</label>
                        <input type="text" id="pTimePerDay" class="form-input" placeholder="15-20 мин">
                    </div>
                    <div class="form-group">
                        <label>Количество видео</label>
                        <input type="number" id="pVideosCount" class="form-input" value="10">
                    </div>
                </div>
                <div class="form-group">
                    <label>URL изображения</label>
                    <input type="text" id="pImage" class="form-input" placeholder="images/photo.jpg или https://...">
                </div>
                <div class="form-group">
                    <label>Для кого</label>
                    <textarea id="pForWhom" class="form-input" rows="2"></textarea>
                </div>
                <div class="form-group">
                    <label>Преимущества (каждое с новой строки)</label>
                    <textarea id="pBenefits" class="form-input" rows="3" placeholder="✓ Устранение болей&#10;✓ Улучшение осанки"></textarea>
                </div>
                <div class="form-group">
                    <label>Программа по неделям (каждая с новой строки)</label>
                    <textarea id="pSchedule" class="form-input" rows="3" placeholder="Неделя 1: Подготовка&#10;Неделя 2: Укрепление"></textarea>
                </div>

                <!-- Уроки программы -->
                <div class="form-group" style="margin-top: 20px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                        <label style="margin: 0;"><i class="fas fa-video"></i> Уроки программы</label>
                        <button type="button" class="btn btn-sm btn-primary" onclick="addLesson()">
                            <i class="fas fa-plus"></i> Добавить урок
                        </button>
                    </div>
                    <div id="lessonsContainer" style="border: 2px solid #eef2f6; border-radius: 8px; padding: 15px;">
                        <div id="noLessons" style="text-align: center; color: #7f8c8d; padding: 20px;">
                            <i class="fas fa-inbox" style="font-size: 32px; margin-bottom: 10px;"></i>
                            <p>Пока нет уроков. Нажмите "Добавить урок"</p>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label><input type="checkbox" id="pActive" checked> <span style="margin-left: 8px;">Активна</span></label>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn btn-outline" onclick="window.closeProgramModal()">Отмена</button>
                    <button type="submit" class="btn btn-primary">💾 Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase -->
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/trainer-programs.js"></script>
</body>
</html>
