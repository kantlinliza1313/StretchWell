<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Уроки программы - StretchWell</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/lessons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="dashboard-page">
    <!-- Боковая панель -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="index.html" class="logo-link">
                <span class="logo-text">StretchWell</span>
            </a>
            <button class="sidebar-close" id="sidebarClose">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <i class="fas fa-user"></i>
                <span>Профиль</span>
            </a>
            <a href="my_programs.html" class="nav-item">
                <i class="fas fa-dumbbell"></i>
                <span>Каталог программ</span>
            </a>
            <a href="progress.html" class="nav-item">
                <i class="fas fa-chart-line"></i>
                <span>Прогресс</span>
            </a>
            <a href="schedule.html" class="nav-item">
                <i class="fas fa-calendar-alt"></i>
                <span>Расписание</span>
            </a>
            <a href="settings.html" class="nav-item">
                <i class="fas fa-cog"></i>
                <span>Настройки</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <a href="index.html" class="nav-item logout" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i>
                <span>Выйти</span>
            </a>
        </div>
    </aside>

    <!-- Основной контент -->
    <main class="main-content">
        <header class="top-bar">
            <button class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </button>
            <div class="top-bar-center">
                <h2 class="page-title" id="programTitle">Загрузка...</h2>
            </div>
            <div class="user-info">
                <span class="user-name" id="topUserName">Пользователь</span>
                <div class="user-avatar-wrapper">
                    <img src="https://ui-avatars.com/api/?name=User&background=6198FF&color=fff" 
                         alt="Avatar" 
                         class="user-avatar"
                         id="userAvatar">
                </div>
            </div>
        </header>

        <div class="page-content">
            <!-- Информация о программе -->
            <div class="program-info-card">
                <div class="program-header">
                    <h1 id="programName">Название программы</h1>
                    <p id="programDesc" class="program-description">Описание программы</p>
                </div>
                
                <div class="program-stats">
                    <div class="stat-item">
                        <div class="stat-icon">
                            <i class="fas fa-video"></i>
                        </div>
                        <div class="stat-info">
                            <span class="stat-value" id="totalLessons">0</span>
                            <span class="stat-label">уроков</span>
                        </div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-icon">
                            <i class="fas fa-clock"></i>
                        </div>
                        <div class="stat-info">
                            <span class="stat-value" id="totalDuration">0</span>
                            <span class="stat-label">минут</span>
                        </div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-icon">
                            <i class="fas fa-chart-line"></i>
                        </div>
                        <div class="stat-info">
                            <span class="stat-value" id="progressPercent">0%</span>
                            <span class="stat-label">прогресс</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Уроки -->
            <div class="lessons-section">
                <h3 class="section-title">
                    <i class="fas fa-list-ul"></i>
                    Уроки программы
                </h3>
                
                <div class="lessons-grid" id="lessonsGrid">
                    <!-- Уроки загрузятся из Firebase -->
                    <div class="loading">
                        <i class="fas fa-spinner fa-spin"></i>
                        Загрузка уроков...
                    </div>
                </div>
            </div>
        </div>
    </main>
<!-- Модальное окно для просмотра видео -->
<div class="video-modal" id="videoModal">
    <div class="video-modal-overlay" onclick="closeVideoModal()"></div>
    <div class="video-modal-content">
        <div class="video-modal-header">
            <div class="video-modal-title">
                <h3 id="modalLessonTitle">Название урока</h3>
                <span class="lesson-duration" id="modalLessonDuration">12 мин</span>
            </div>
            <button class="video-modal-close" onclick="closeVideoModal()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <div class="video-player-container">
            <div class="video-wrapper" id="videoWrapper">
                <!-- Видео загрузится здесь -->
                <iframe id="videoPlayer" src="" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
        
        <div class="video-modal-footer">
            <div class="lesson-navigation">
                <button class="nav-btn prev-lesson" id="prevLessonBtn" onclick="navigateLesson(-1)">
                    <i class="fas fa-chevron-left"></i>
                    <span>Предыдущий урок</span>
                </button>
                <button class="nav-btn next-lesson" id="nextLessonBtn" onclick="navigateLesson(1)">
                    <span>Следующий урок</span>
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
            <button class="btn-complete-lesson" id="completeLessonBtn" onclick="completeLesson()">
                <i class="fas fa-check"></i>
                Завершить урок
            </button>
        </div>
    </div>
</div>
    <!-- Firebase -->
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/lessons.js"></script>
</body>
</html>
