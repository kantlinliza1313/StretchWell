<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сообщения - StretchWell</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="dashboard-page">
    <!-- Боковая панель -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="index.html" class="logo-link">
                <span class="logo-text">StretchWell</span>
            </a>
            <button class="sidebar-close" id="sidebarClose">
                <i class="fas fa-times"></i>
            </button>
        </div>

       <nav class="sidebar-nav">
    <a href="dashboard.html" class="nav-item">
        <i class="fas fa-user"></i>
        <span>Профиль</span>
    </a>
    <a href="my_programs.html" class="nav-item">
        <i class="fas fa-dumbbell"></i>
        <span>Каталог программ</span>
    </a>
    <a href="progress.html" class="nav-item">
        <i class="fas fa-chart-line"></i>
        <span>Прогресс</span>
    </a>
    <a href="schedule.html" class="nav-item">
        <i class="fas fa-calendar-alt"></i>
        <span>Расписание</span>
    </a>
    <a href="client-messages.html" class="nav-item active">
        <i class="fas fa-envelope"></i>
        <span>Сообщения</span>
        <span class="badge badge-info" id="msgCount" style="display:none">0</span>
    </a>
    <a href="dashboard-reviews.html" class="nav-item">
        <i class="fas fa-star"></i>
        <span>Мои отзывы</span>
    </a>
    <a href="settings.html" class="nav-item">
        <i class="fas fa-cog"></i>
        <span>Настройки</span>
    </a>
</nav>

        <div class="sidebar-footer">
            <a href="#" class="nav-item logout" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i>
                <span>Выйти</span>
            </a>
        </div>
    </aside>

    <!-- Основной контент -->
    <main class="main-content">
        <header class="top-bar">
            <button class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </button>
            <div class="top-bar-center">
                <h2 class="page-title">Сообщения от тренера</h2>
            </div>
            <div class="user-info">
                <span class="user-name" id="topUserName">Клиент</span>
                <div class="user-avatar-wrapper">
                    <img src="https://ui-avatars.com/api/?name=Client&background=6198FF&color=fff" 
                         alt="Avatar" 
                         class="user-avatar"
                         id="userAvatar">
                </div>
            </div>
        </header>

        <div class="page-content">
            <!-- Список сообщений -->
            <div class="messages-container">
                <div class="messages-header">
                    <h3><i class="fas fa-inbox"></i> Входящие от тренера</h3>
                    <button class="btn btn-outline btn-sm" onclick="loadMessages()">
                        <i class="fas fa-sync-alt"></i> Обновить
                    </button>
                </div>
                
                <div id="messagesList" class="messages-list">
                    <div class="loading">
                        <i class="fas fa-spinner fa-spin"></i> Загрузка...
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Модальное окно: чтение сообщения -->
    <div class="modal" id="messageModal">
        <div class="modal-overlay" onclick="window.closeMessageModal()"></div>
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h3><i class="fas fa-envelope-open"></i> Сообщение от тренера</h3>
                <button class="modal-close" onclick="window.closeMessageModal()">&times;</button>
            </div>
            <div class="modal-body" id="messageBody" style="padding: 25px;">
                <!-- Загрузится динамически -->
            </div>
        </div>
    </div>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/client-messages.js"></script>
    <script>
document.addEventListener('DOMContentLoaded', function() {
    const menuToggle = document.getElementById('menuToggle');
    const sidebar = document.getElementById('sidebar');
    const sidebarClose = document.getElementById('sidebarClose');
    
    if (menuToggle && sidebar) {
        // Создаём overlay для затемнения фона
        const overlay = document.createElement('div');
        overlay.className = 'sidebar-overlay';
        document.body.appendChild(overlay);
        
        // Открытие меню
        menuToggle.addEventListener('click', function(e) {
            e.stopPropagation();
            sidebar.classList.add('active');
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        });
        
        // Закрытие меню через кнопку X
        if (sidebarClose) {
            sidebarClose.addEventListener('click', function() {
                closeSidebar();
            });
        }
        
        // Закрытие по клику на overlay
        overlay.addEventListener('click', function() {
            closeSidebar();
        });
        
        // Закрытие при клике на пункт меню
        document.querySelectorAll('.sidebar-nav .nav-item').forEach(item => {
            item.addEventListener('click', function() {
                if (window.innerWidth <= 1024) {
                    closeSidebar();
                }
            });
        });
        
        // Закрытие при изменении размера окна
        window.addEventListener('resize', function() {
            if (window.innerWidth > 1024) {
                sidebar.classList.remove('active');
                overlay.classList.remove('active');
                document.body.style.overflow = '';
            }
        });
        
        // Закрытие по клавише Escape
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && sidebar.classList.contains('active')) {
                closeSidebar();
            }
        });
        
        // Функция закрытия меню
        function closeSidebar() {
            sidebar.classList.remove('active');
            overlay.classList.remove('active');
            document.body.style.overflow = '';
        }
        
        console.log('✅ Боковое меню инициализировано');
    }
});
</script>
</body>

</html>
